openapi: 3.0.3
info:
  title: Projeto controle de pizzas 
  description: |-
   API destinada ao controle de pizzas - SENAI
  termsOfService: http://swagger.io/terms/
  contact:
    email: vertex@email.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
externalDocs:
  description: Find out more about Swagger
  url: http://swagger.io
servers:
  - url: http://
paths:
  /v1/senai/pizzaria/pizza:
    post:
      tags:
        - Pizza
      summary: Adiciona uma nova Pizza
      description: Endpoint para enviar os dados da pizza a ser cadastrada
      requestBody:
        description: JSON contendo os dados da nova pizza a ser inserido no sistema
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pizza'
        required: true
      responses:
        '201':
          description: Successful operation
        '400':
          description: Invalid input
        '415':
          description: Invalid Content-Type
        '500':
          description: Error Internal Server (Controller / Model)
    get:
      tags:
        - Pizza
      summary: Lista todas as pizzas
      description: Listagem de todos as pizzas registrados no sistema
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pizza'          
           
        '404':
          description: Not Found
        '500':
          description: Error Internal Server (Controller / Model)


  /v1/senai/pizzaria/pizza/{id}:
    get:
      tags:
        - Pizza
      summary: Busca uma pizza pelo ID
      description: Retorna uma pizza pelo ID
      parameters:
        - name: id
          in: path
          description: ID para realizar a busca da Pizza
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pizza'          
        '400':
          description: Invalid ID supplied
        '404':
          description: Not found
        '500':
          description: Error Internal Server (Controller / Model)  
  
    put:
      tags:
        - Pizza
      summary: Atualizar uma Pizza pelo ID
      description: Buscar e atualizar uma Pizza pelo ID
      parameters:
        - name: id
          in: path
          description: ID para realizar a busca da Pizza
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Dados para atualizar uma Pizza
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pizza'
        required: true
      responses:
        '200':
          description: Successful operation
        '400':
          description: Invalid ID supplied
        '404':
          description: Not found
        '415':
          description: Invalid Content-Type
        '500':
          description: Error Internal Server (Controller / Model)

       
    delete:
      tags:
        - Pizza
      summary: Excluir uma Pizza pelo ID
      description: Buscar e excluir uma Pizza pelo ID
      parameters:
        - name: id
          in: path
          description: ID para buscar a Pizza
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: successful operation
        '400':
          description: Invalid ID supplied
        '404':
          description: Not found
        '500':
          description: Error Internal Server (Controller / Model)

  /v1/senai/pizzaria/pizza/tipo:
    post:
      tags:
        - Tipo
      summary: Adiciona uma novo Tipo
      description: Endpoint para enviar os dados do tipo a ser cadastrado
      requestBody:
        description: JSON contendo os dados do tipo a ser inserido no sistema
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tipo'
        required: true
      responses:
        '201':
          description: Successful operation
        '400':
          description: Invalid input
        '415':
          description: Invalid Content-Type
        '500':
          description: Error Internal Server (Controller / Model)

    get:
      tags:
        - Tipo
      summary: Lista todos os tipos
      description: Listagem de todos os tipos registrados no sistema
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tipo'          
           
        '404':
          description: Not Found
        '500':
          description: Error Internal Server (Controller / Model)


  /v1/senai/pizzaria/pizza/tipo/{id}:
    get:
      tags:
        - Tipo
      summary: Busca um tipo pelo ID
      description: Retorna um tipo pelo ID
      parameters:
        - name: id
          in: path
          description: ID para realizar a busca do tipo
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tipo'          
        '400':
          description: Invalid ID supplied
        '404':
          description: Not found
        '500':
          description: Error Internal Server (Controller / Model)  
  
    put:
      tags:
        - Tipo
      summary: Atualizar um Tipo pelo ID
      description: Buscar e atualizar um Tipo pelo ID
      parameters:
        - name: id
          in: path
          description: ID para realizar a busca do Tipo
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Dados para atualizar um Tipo
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tipo'
        required: true
      responses:
        '200':
          description: Successful operation
        '400':
          description: Invalid ID supplied
        '404':
          description: Not found
        '415':
          description: Invalid Content-Type
        '500':
          description: Error Internal Server (Controller / Model)

       
    delete:
      tags:
        - Tipo
      summary: Excluir um Tipo pelo ID
      description: Buscar e excluir um Tipo pelo ID
      parameters:
        - name: id
          in: path
          description: ID para buscar o Tipo
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: successful operation
        '400':
          description: Invalid ID supplied
        '404':
          description: Not found
        '500':
          description: Error Internal Server (Controller / Model)

  /v1/senai/pizzaria/adm:
    post:
      tags:
        - Administrador
      summary: Adiciona um novo administrador
      description: Endpoint para enviar os dados do administrador a ser cadastrado
      requestBody:
        description: JSON contendo os dados do administrador a ser inserido no sistema
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Administrador'
        required: true
      responses:
        '201':
          description: Successful operation
        '400':
          description: Invalid input
        '415':
          description: Invalid Content-Type
        '500':
          description: Error Internal Server (Controller / Model)

  /v1/senai/pizzaria/autenticacao/adm:
    post:
      tags:
        - Administrador
      summary: Autentica o administrador
      description: Endpoint para autenticar o administrador
      requestBody:
        description: JSON contendo os dados do administrador a ser autenticado no sistema
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Administrador'
        required: true
      responses:
        '201':
          description: Successful operation
        '400':
          description: Invalid input
        '415':
          description: Invalid Content-Type
        '500':
          description: Error Internal Server (Controller / Model)

components:
  schemas:
    Pizza:
      required:
        - id
        - nome
        - descricao
        - imagem
        - tipo
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        descricao:
          type: string
        imagem:
          type: string
        tipo:
          type: array
    Tipo:
      required:
      - id
      - tipo 
      type: object
      properties:
        id:
          type: integer
        tipo:
          type: string

    Administrador:
      required:
      - id
      - nome
      - senha
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        senha:
          type: string


  requestBodies:
    Pizza:
      description: Objeto que deve ser enviado no Body das requisicoes
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Pizza'

    Tipo:
      description: Objeto que deve ser enviado no Body das requisicoes
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Tipo'

    Administrador:
      description: Objeto que deve ser enviado no Body das requisicoes
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Administrador'